<!DOCTYPE html>
<html>
<head>
    <title>Three.js Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
    
    <script type="module">
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as THREE from 'three';

        // 1. シーン作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空色

        // 2. カメラ作成
        const camera = new THREE.PerspectiveCamera(
            75, 
            window.innerWidth / window.innerHeight,
            0.1, 
            1000
        );
        camera.position.z = 5;

        // 3. レンダラー作成
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        renderer.shadowMap.enabled = true;


        // 4. 立方体を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        // const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });

        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // もう一つの立方体（赤）
        const cube2Geom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const cube2Mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const cube2 = new THREE.Mesh(cube2Geom, cube2Mat);
        cube2.position.x = 2;  // 右に 2 移動
        scene.add(cube2);

        // 球体（青）
        const sphereGeom = new THREE.SphereGeometry(0.7, 32, 32);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const sphere = new THREE.Mesh(sphereGeom, sphereMat);
        sphere.position.x = -2;  // 左に 2 移動
        scene.add(sphere);

        //Set the light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // 方向光（太陽のような光）
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 20, 5);
        scene.add(directionalLight);
        directionalLight.castShadow = true;

        
        //add the ground
        const groundGeom = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a5a });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;  // 平にする
        ground.position.y = -1;
        scene.add(ground);
        ground.receiveShadow = true;

        
        //Set the cube position
        cube.position.y = 0.5;  // 上に移動
        cube.castShadow = true;

        cube2.position.y = 0.5;  // 上に移動
        cube2.castShadow = true;



        // 5. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            cube2.rotation.y += 0.02;
            sphere.rotation.x += 0.02;
            controls.update();  // ← これを追加
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
