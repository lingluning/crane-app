<!DOCTYPE html>
<html>

<head>
    <title>Three.js Test</title>
    <style>
        .tool-btn {
            transition: all 0.15s;
        }

        .tool-btn:hover {
            transform: translateY(-2px);
        }

        .tool-btn.active {
            background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.6);
            border: 2px solid #60a5fa;
        }
        .plate-size-btn {
            padding: 4px 12px;
            background: #475569;
            color: white;
            border-radius: 6px;
            transition: all 0.15s;
            font-size: 13px;
            border: 2px solid transparent;
        }

        .plate-size-btn:hover {
            background: #64748b;
        }

        .plate-size-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
            font-weight: bold;
        }

    </style>
    

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <!-- 替换之前的简陋 UI -->
    <div id="coord-display"
        class="fixed bottom-5 right-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg font-mono text-sm">
        座標: -
    </div>

    <div id="counter" class="fixed bottom-5 left-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg space-y-1 text-sm">
        <div>🏗️ クレーン: <span id="count-crane" class="font-bold text-yellow-400">0</span></div>
        <div>📦 吊荷: <span id="count-load" class="font-bold text-orange-400">0</span></div>
        <div>🟨 敷鉄板: <span id="count-plate" class="font-bold text-yellow-200">0</span></div>
    </div>

    <button id="undo-btn" class="fixed top-[20px] right-[40px] px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg">
        ↶ 元に戻す
    </button>

    <!-- 顶部加工具栏 -->


    <div id="tool-palette" class="fixed top-5 left-5 bg-slate-900/90 p-2 rounded-lg flex flex-col gap-2 z-50">
        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="select">
            <span class="text-2xl">👆</span>
            <span>選択</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="crane">
            <span class="text-2xl">🏗️</span>
            <span>クレーン</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="load">
            <span class="text-2xl">📦</span>
            <span>吊荷</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="plate">
            <span class="text-2xl">🟨</span>
            <span>敷鉄板</span>
        </button>
    </div>

    <div id="loading" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 text-white text-2xl">
            🏗️ 読み込み中...
    </div>





    <div id="info-panel" class="fixed top-5 right-20 bg-slate-900/80 text-white p-4 rounded-lg w-64 hidden">
        <h3 class="font-bold mb-2">選択中</h3>
        <div id="info-content"></div>
    </div>

    <div id="crane-info" class="fixed bottom-20 right-5 bg-slate-900/80 text-white p-4 rounded-lg hidden">
        <div class="font-bold mb-2">🏗️ クレーン情報</div>
        <div>型式: TADANO GR-250N</div>
        <div>作業半径: 7.0 m</div>
        <div>配置数: <span id="info-count">0</span></div>
    </div>

    <div id="crane-control" class="fixed bottom-60 right-5 bg-slate-900/90 text-white p-4 rounded-lg w-72 hidden">
        <div class="font-bold mb-3">🏗️ クレーン制御</div>
        
        <label class="text-sm">
            作業半径: <span id="radius-value" class="font-bold text-yellow-400">10.0</span> m
        </label>
        <input type="range" id="radius-slider" 
            min="5" max="15" step="0.5" value="10" 
            class="w-full mb-3">
        
        <label class="text-sm">
            旋回角度: <span id="rotation-value" class="font-bold text-yellow-400">0</span>°
        </label>
        <input type="range" id="rotation-slider" 
            min="0" max="360" step="15" value="0" 
            class="w-full">
        
        <div class="text-xs text-slate-400 mt-2">
            💡 R キーでも旋回できます
        </div>
    </div>


    <div id="plate-options" class="fixed top-5 left-32 bg-slate-900/80 text-white p-3 rounded-lg hidden">
        <div class="text-sm font-bold mb-2">敷鉄板サイズ</div>
        <div class="flex gap-2">
            <button class="plate-size-btn active" data-size="1.5x3">1.5×3</button>
            <button class="plate-size-btn" data-size="2x4">2×4</button>
            <button class="plate-size-btn" data-size="1x2">1×2</button>
        </div>
    </div>


    <div class="fixed top-5 right-44 flex gap-2">
        <button id="save-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">
            💾 保存
        </button>
        <button id="load-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
            📂 読込
        </button>
    </div>



    <script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

    <script type="module">
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';  // ADD GLFT
        import * as THREE from 'three';

        // === 1. 状态 ===
        const placedObjects = [];
        let currentTool = 'crane';
        let selectedObject = null;
        let ghost = null;
        let craneTemplate = null;
        let loadedCount = 0;
        const totalLoads = 2;
        let siteModel = null;
        let currentPlateSize = { x: 1.5, z: 3 };
  







        // === 2. Three.js 基础设置 ===
        // 1. シーン作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空色

        // 2. カメラ作成
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 5;

        // 3. レンダラー作成
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        renderer.shadowMap.enabled = true;



        // === 3. 场景内容 ===

        //Set the light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // 方向光（太陽のような光）
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 20, 5);
        scene.add(directionalLight);
        directionalLight.castShadow = true;


        //add the ground
        const groundGeom = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a5a });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;  // 平にする
        ground.position.y = -1;
        scene.add(ground);
        ground.receiveShadow = true;

        // 加载 Python 生成的 吊车模型
        const gltfLoader = new GLTFLoader();

        gltfLoader.load('./models/crane_TADANO_GR-250N.glb', (gltf) => {
            craneTemplate = gltf.scene;
            checkLoaded();
            console.log('✅ 吊车模板加载完成');
        });
        
        // 加载场地
        gltfLoader.load(
            './models/site.glb',
            (gltf) => {
                checkLoaded();
                console.log('✅ 场地加载完成');
                gltf.scene.position.set(0, -1, 0);
                
                // ⭐ 让 site 能接收影子和被检测
                gltf.scene.traverse(child => {
                    if (child.isMesh) {
                        child.receiveShadow = true;
                    }
                });
                
                siteModel = gltf.scene;  // ⭐ 保存引用
                scene.add(gltf.scene);
            }
        );


        // === 4. 工具相关函数 ===

        function selectTool(toolName) {
            currentTool = toolName;

            document.querySelectorAll('.tool-btn').forEach(b => {
                b.classList.remove('active');
            });
            document.querySelector(`[data-tool="${toolName}"]`).classList.add('active');

            updateGhost();  // ⭐ 切换工具时更新 ghost

            document.getElementById('plate-options').classList.toggle('hidden', toolName !== 'plate');

        }

        function updateGhost() {
            if (ghost) {
                scene.remove(ghost);
                ghost = null;
            }

            let geometry, material;

            switch (currentTool) {
                case 'crane':
                    geometry = new THREE.CylinderGeometry(0.5, 0.7, 1.5);
                    material = new THREE.MeshStandardMaterial({ color: 0xffc800, transparent: true, opacity: 0.5 });
                    break;
                case 'load':
                    geometry = new THREE.BoxGeometry(1, 1, 1);
                    material = new THREE.MeshStandardMaterial({ color: 0x8b6f47, transparent: true, opacity: 0.5 });
                    break;
                case 'plate':
                    // ⭐ 用当前选中的尺寸
                    geometry = new THREE.BoxGeometry(currentPlateSize.x, 0.1, currentPlateSize.z);
                    material = new THREE.MeshStandardMaterial({ color: 0xffd700, transparent: true, opacity: 0.5 });
                    break;
                case 'select':
                    return;
            }

            ghost = new THREE.Mesh(geometry, material);
            scene.add(ghost);
        }

        function placeCrane(point) {
              const existingCrane = placedObjects.find(o => o.userData.type === 'crane');
                if (existingCrane) {
                    alert('⚠️ クレーンは 1 台のみ配置可能です\n既存のクレーンを削除してから配置してください');
                    return;
                }

            if (!craneTemplate) {
                console.log('吊车模型还没加载完，请稍等');
                return;
            }
            
            // 克隆模板（因为一个模型不能用多次）
            const crane = craneTemplate.clone();
            crane.position.copy(point);
            crane.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    // ✅ 关键：复制 material，让每辆吊车有自己的 material
                    if (child.material) {
                        child.material = child.material.clone();
                    }
                }
            });


            crane.userData = { type: 'crane' };
            scene.add(crane);
            placedObjects.push(crane);
            updateCounters();
            


                // ⭐ 加作业半径圆
            const radiusGeom = new THREE.RingGeometry(10, 12, 64);  // 内径 6.8, 外径 7.0
            const radiusMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            const radiusCircle = new THREE.Mesh(radiusGeom, radiusMat);
            radiusCircle.rotation.x = -Math.PI / 2;  // 平放
            radiusCircle.position.copy(point);
            radiusCircle.position.y += 0.05;  // 稍高于地面
            scene.add(radiusCircle);
            
            // 让圆跟随吊车（如果以后要删除吊车，圆也要删）
            crane.userData.radiusCircle = radiusCircle;

            document.getElementById('crane-info').classList.remove('hidden');
            const count = placedObjects.filter(o => o.userData.type === 'crane').length;
            document.getElementById('info-count').textContent = count;
            
            updateCraneButton()

        
        }

        function placeLoad(point) {
            // 棕色立方体（吊荷）
            const load = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshStandardMaterial({ color: 0x8b6f47 })
            );
            load.position.copy(point);
            load.position.y +=  0.5;
            load.castShadow = true;
            load.userData = { type: 'load' };
            scene.add(load);
            placedObjects.push(load);
            updateCounters();
        }

        function placePlate(point) {
            const { x: sx, z: sz } = currentPlateSize;
            
            const plate = new THREE.Mesh(
                new THREE.BoxGeometry(sx, 0.1, sz),
                new THREE.MeshStandardMaterial({ color: 0xffd700 })
            );
            plate.position.copy(point);
            
            // ⭐ 网格对齐
            plate.position.x = snapToGrid(plate.position.x);
            plate.position.z = snapToGrid(plate.position.z);
            plate.position.y += 0.05;
            
            plate.receiveShadow = true;
            plate.userData = { 
                type: 'plate', 
                size: { x: sx, z: sz }
            };
            scene.add(plate);
            placedObjects.push(plate);
            updateCounters();
        }



        function showInfo(obj) {
            const panel = document.getElementById('info-panel');
            const content = document.getElementById('info-content');

            if (!obj) {
                panel.classList.add('hidden');
                return;
            }

            const typeNames = {
                crane: '🏗️ クレーン',
                load: '📦 吊荷',
                plate: '🟨 敷鉄板'
            };

            content.innerHTML = `
        <div>種類: ${typeNames[obj.userData.type]}</div>
        <div>位置: X=${obj.position.x.toFixed(1)}, Z=${obj.position.z.toFixed(1)}</div>
        <div class="text-xs text-slate-400 mt-2">DEL キーで削除</div>
    `;
            panel.classList.remove('hidden');
        }




        function handleSelect() {
            const intersects = raycaster.intersectObjects(placedObjects, true);  // ⭐ true = 递归
            
            // 取消之前的选中
            if (selectedObject) {
                clearHighlight(selectedObject);
                selectedObject = null;
            }
            
            if (intersects.length > 0) {
                // ⭐ 找到根对象（placedObjects 里的那个）
                const root = findRootObject(intersects[0].object);
                if (root) {
                    selectedObject = root;
                    applyHighlight(selectedObject);
                    console.log('选中了:', selectedObject.userData.type);
                }
            }
            
            showInfo(selectedObject);


            // ⭐ 显示/隐藏控制面板
            const ctrl = document.getElementById('crane-control');
            if (selectedObject && selectedObject.userData.type === 'crane') {
                ctrl.classList.remove('hidden');
                // 同步当前值
                const r = selectedObject.userData.workRadius || 10;
                document.getElementById('radius-slider').value = r;
                document.getElementById('radius-value').textContent = r.toFixed(1);
                
                const rot = (selectedObject.rotation.y * 180 / Math.PI) % 360;
                document.getElementById('rotation-slider').value = rot;
                document.getElementById('rotation-value').textContent = rot.toFixed(0);
            } else {
                ctrl.classList.add('hidden');
            }
        }


        function findRootObject(mesh) {
            // 沿着父级向上找，直到找到 placedObjects 里的物体
            let obj = mesh;
            while (obj) {
                if (placedObjects.includes(obj)) {
                    return obj;
                }
                obj = obj.parent;
            }
            return null;
        }






        function updateCounters() {
            const cranes = placedObjects.filter(o => o.userData.type === 'crane');
            const loads = placedObjects.filter(o => o.userData.type === 'load');
            const plates = placedObjects.filter(o => o.userData.type === 'plate');

            document.getElementById('count-crane').textContent = cranes.length;
            document.getElementById('count-load').textContent = loads.length;
            document.getElementById('count-plate').textContent = plates.length;
        }
        

        function checkLoaded() {
            loadedCount++;
            if (loadedCount >= totalLoads) {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function applyHighlight(obj) {
            obj.traverse(child => {
                if (child.isMesh && child.material && child.material.emissive) {
                    // ✅ 用 undefined 判断（0 也算"已保存过"）
                    if (child.userData._origEmissive === undefined) {
                        child.userData._origEmissive = child.material.emissive.getHex();
                    }
                    child.material.emissive.setHex(0x0044ff);
                }
            });
        }

        function clearHighlight(obj) {
            obj.traverse(child => {
                if (child.isMesh && child.material && child.material.emissive) {
                    if (child.userData._origEmissive !== undefined) {
                        child.material.emissive.setHex(child.userData._origEmissive);
                    } else {
                        child.material.emissive.setHex(0x000000);
                    }
                }
            });
        }

        function getGroundIntersect() {
                const targets = [ground];
                if (siteModel) {
                    // 把 site 的所有子 mesh 都加进来
                    siteModel.traverse(child => {
                        if (child.isMesh) targets.push(child);
                    });
                }
                return raycaster.intersectObjects(targets);  // ⭐ Objects (复数)
        }


        function snapToGrid(value, gridSize = 0.5) {
            return Math.round(value / gridSize) * gridSize;
        }

        function updateCraneButton() {
            const btn = document.querySelector('[data-tool="crane"]');
            const hasCrane = placedObjects.some(o => o.userData.type === 'crane');
            
            if (hasCrane) {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.title = 'クレーンは 1 台まで';
            } else {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.title = '';
            }
        }

        function serialize() {
                const data = {
                    version: '1.0',
                    savedAt: new Date().toISOString(),
                    objects: placedObjects.map(obj => ({
                        type: obj.userData.type,
                        position: {
                            x: obj.position.x,
                            y: obj.position.y,
                            z: obj.position.z
                        },
                        rotation: obj.rotation.y,
                        // 各种类型特有的数据
                        ...(obj.userData.type === 'crane' && {
                            workRadius: obj.userData.workRadius || 10,
                            model: 'TADANO_GR-250N'
                        }),
                        ...(obj.userData.type === 'plate' && {
                            size: obj.userData.size
                        })
                    }))
                };
                
                return data;
            }


        function deserialize(data) {
    // 先清空当前所有物体
    placedObjects.forEach(obj => {
        if (obj.userData.radiusCircle) scene.remove(obj.userData.radiusCircle);
        scene.remove(obj);
    });
    placedObjects.length = 0;
    selectedObject = null;
    
    // 然后根据数据重建
    data.objects.forEach(item => {
        const point = new THREE.Vector3(item.position.x, item.position.y, item.position.z);
        
        switch (item.type) {
            case 'crane':
                placeCrane(point);
                // 应用旋转和半径
                const lastCrane = placedObjects[placedObjects.length - 1];
                if (lastCrane) {
                    lastCrane.rotation.y = item.rotation || 0;
                    if (item.workRadius) {
                        updateCraneRadius(lastCrane, item.workRadius);
                    }
                }
                break;
                
            case 'load':
                placeLoad(point);
                const lastLoad = placedObjects[placedObjects.length - 1];
                if (lastLoad) {
                    lastLoad.rotation.y = item.rotation || 0;
                }
                break;
                
            case 'plate':
                if (item.size) {
                    currentPlateSize = item.size;
                }
                placePlate(point);
                const lastPlate = placedObjects[placedObjects.length - 1];
                if (lastPlate) {
                    lastPlate.rotation.y = item.rotation || 0;
                }
                break;
        }
    });
    
    updateCounters();
}

document.getElementById('load-btn').addEventListener('click', () => {
    const saved = localStorage.getItem('crane_plan');
    
    if (!saved) {
        alert('保存されたプランがありません');
        return;
    }
    
    try {
        const data = JSON.parse(saved);
        deserialize(data);
        alert(`✅ 読み込みました\n${data.objects.length} 個のオブジェクト\n保存時刻: ${data.savedAt}`);
    } catch (e) {
        alert('❌ 読み込みエラー');
        console.error(e);
    }
});    

        // === 5. 事件监听 ===

        // 在你已有的代码下面
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 监听鼠标移动
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = getGroundIntersect();

            if (intersects.length > 0) {
                const point = intersects[0].point;

                document.getElementById('coord-display').textContent =
                    `座標: X=${point.x.toFixed(2)}, Z=${point.z.toFixed(2)}`;

                if (ghost) {
                    ghost.position.copy(point);  // ⭐ 用 copy，自动包含 Y
                
                    if (currentTool === 'plate') {
                        ghost.position.x = snapToGrid(ghost.position.x);
                        ghost.position.z = snapToGrid(ghost.position.z);
                    }
                    // Y 位置根据形状不同要调整
                    if (currentTool === 'crane') ghost.position.y += 0.75;
                    if (currentTool === 'load') ghost.position.y += 0.5;
                    if (currentTool === 'plate') ghost.position.y += 0.05;
                }
            }
        });


        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = getGroundIntersect();  // ⭐ 改这里

            if (intersects.length === 0) return;  // 没点到地面

            const point = intersects[0].point;

            // ⭐ 根据工具做不同的事
            switch (currentTool) {
                case 'crane':
                    placeCrane(point);
                    break;
                case 'load':
                    placeLoad(point);
                    break;
                case 'plate':
                    placePlate(point);
                    break;
                case 'select':
                    handleSelect();
                    break;

            }
        });

        window.addEventListener('keydown', (event) => {
            // ESC 切回选择工具
            if (event.key === 'Escape') {
                selectTool('select');
            }

            // ⭐ DEL 或 Backspace 删除选中物体
            if (event.key === 'Delete' || event.key === 'Backspace') {
                if (selectedObject) {
                    // ⭐ 如果是吊车，还要删除它的半径圆
                    if (selectedObject.userData.radiusCircle) {
                        scene.remove(selectedObject.userData.radiusCircle);
                    }
                    
                    scene.remove(selectedObject);
                    const index = placedObjects.indexOf(selectedObject);
                    if (index > -1) placedObjects.splice(index, 1);
                    selectedObject = null;
                    updateCounters();
                    updateCraneButton()
                }
            }

              
            // ⭐ R 键旋转选中的物体
            if (event.key === 'r' || event.key === 'R') {
                if (selectedObject) {
                    selectedObject.rotation.y += Math.PI / 18;  // 每次 10°
                    
                    // 如果有半径圆，也跟着转（虽然圆是对称的，但保持一致）
                    if (selectedObject.userData.radiusCircle) {
                        // 圆是对称的，可以不旋转
                    }
                    
                    console.log('旋转中:', selectedObject.userData.type);
                }
            }

        });




        // 工具切换
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const toolName = btn.dataset.tool;  // 取 data-tool 的值
                selectTool(toolName);
            });
        });


        document.getElementById('undo-btn').addEventListener('click', () => {
            if (placedObjects.length === 0) return;

            const last = placedObjects.pop();  // 取最后一个

            if (last.userData.radiusCircle) {
                scene.remove(last.userData.radiusCircle);
            }
            scene.remove(last);
            updateCounters();
            updateCraneButton()
        });


                // 滑杆事件
        document.getElementById('radius-slider').addEventListener('input', (e) => {
            if (!selectedObject || selectedObject.userData.type !== 'crane') return;
            
            const radius = parseFloat(e.target.value);
            document.getElementById('radius-value').textContent = radius.toFixed(1);
            
            // 更新作业半径圆
            updateCraneRadius(selectedObject, radius);
        });

        document.getElementById('rotation-slider').addEventListener('input', (e) => {
            if (!selectedObject || selectedObject.userData.type !== 'crane') return;
            
            const angleDeg = parseFloat(e.target.value);
            document.getElementById('rotation-value').textContent = angleDeg;
            
            selectedObject.rotation.y = (angleDeg * Math.PI) / 180;
        });


        document.querySelectorAll('.plate-size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const [x, z] = btn.dataset.size.split('x').map(Number);
                currentPlateSize = { x, z };
                
                document.querySelectorAll('.plate-size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (currentTool === 'plate') {
                    updateGhost();
                }
            });
        });
        
        document.getElementById('save-btn').addEventListener('click', () => {
            const data = serialize();
            localStorage.setItem('crane_plan', JSON.stringify(data));
            
            // 友好提示
            alert(`✅ 保存しました\n${data.objects.length} 個のオブジェクト`);
            console.log('保存的数据:', data);
        });

        setInterval(() => {
            if (placedObjects.length > 0) {
                const data = serialize();
                localStorage.setItem('crane_plan_auto', JSON.stringify(data));
                console.log('🔄 自动保存:', new Date().toLocaleTimeString());
            }
        }, 30000);  // 30 秒


        function updateCraneRadius(crane, radiusMeters) {
            // 删除旧的半径圆
            if (crane.userData.radiusCircle) {
                scene.remove(crane.userData.radiusCircle);
            }
            
            // 创建新的
            const radiusGeom = new THREE.RingGeometry(
                radiusMeters - 0.15, 
                radiusMeters + 0.15, 
                64
            );
            const radiusMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            const newCircle = new THREE.Mesh(radiusGeom, radiusMat);
            newCircle.rotation.x = -Math.PI / 2;
            newCircle.position.copy(crane.position);
            newCircle.position.y += 0.05;
            scene.add(newCircle);
            
            crane.userData.radiusCircle = newCircle;
            crane.userData.workRadius = radiusMeters;
        }



        // === 6. 启动 ===

        // 默认选中 crane
        selectTool('crane');
        // 5. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();  // ← これを追加
            renderer.render(scene, camera);
        }
        animate();



    </script>
</body>

</html>
