<!DOCTYPE html>
<html>

<head>
    <title>Three.js Test</title>
    <style>
        .tool-btn {
            transition: all 0.15s;
        }

        .tool-btn:hover {
            transform: translateY(-2px);
        }

        .tool-btn.active {
            background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.6);
            border: 2px solid #60a5fa;
        }
        .plate-size-btn {
            padding: 4px 12px;
            background: #475569;
            color: white;
            border-radius: 6px;
            transition: all 0.15s;
            font-size: 13px;
            border: 2px solid transparent;
        }

        .plate-size-btn:hover {
            background: #64748b;
        }

        .plate-size-btn.active {
            background: #3b82f6;
            border-color: #60a5fa;
            font-weight: bold;
        }

    </style>
    

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <!-- 替换之前的简陋 UI -->
    <div id="coord-display"
        class="fixed bottom-5 right-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg font-mono text-sm">
        座標: -
    </div>

    <div id="counter" class="fixed bottom-5 left-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg space-y-1 text-sm">
        <div>🏗️ クレーン: <span id="count-crane" class="font-bold text-yellow-400">0</span></div>
        <div>📦 吊荷: <span id="count-load" class="font-bold text-orange-400">0</span></div>
        <div>🟨 敷鉄板: <span id="count-plate" class="font-bold text-yellow-200">0</span></div>
    </div>

    <button id="undo-btn" class="fixed top-[20px] right-[40px] px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg">
        ↶ 元に戻す
    </button>

    <!-- 顶部加工具栏 -->


    <div id="tool-palette" class="fixed top-5 left-5 bg-slate-900/90 p-2 rounded-lg flex flex-col gap-2 z-50">
        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="select">
            <span class="text-2xl">👆</span>
            <span>選択</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="crane">
            <span class="text-2xl">🏗️</span>
            <span>クレーン</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="load">
            <span class="text-2xl">📦</span>
            <span>吊荷</span>
        </button>

        <button
            class="tool-btn w-16 h-16 bg-slate-700 hover:bg-slate-600 rounded-lg flex flex-col items-center justify-center text-white text-xs"
            data-tool="plate">
            <span class="text-2xl">🟨</span>
            <span>敷鉄板</span>
        </button>
    </div>

    <div id="loading" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 text-white text-2xl">
            🏗️ 読み込み中...
    </div>





    <div id="info-panel" class="fixed top-5 right-20 bg-slate-900/80 text-white p-4 rounded-lg w-64 hidden">
        <h3 class="font-bold mb-2">選択中</h3>
        <div id="info-content"></div>
    </div>

    <div id="crane-info" class="fixed bottom-20 right-5 bg-slate-900/80 text-white p-4 rounded-lg hidden">
        <div class="font-bold mb-2">🏗️ クレーン情報</div>
        <div>型式: TADANO GR-250N</div>
        <div>作業半径: 7.0 m</div>
        <div>配置数: <span id="info-count">0</span></div>
    </div>

    <div id="crane-control" class="fixed bottom-60 right-5 bg-slate-900/90 text-white p-4 rounded-lg w-72 hidden">
        <div class="font-bold mb-3">🏗️ クレーン制御</div>
        
        <label class="text-sm">
            作業半径: <span id="radius-value" class="font-bold text-yellow-400">10.0</span> m
        </label>
        <input type="range" id="radius-slider" 
            min="5" max="15" step="0.5" value="10" 
            class="w-full mb-3">
        
        <label class="text-sm">
            旋回角度: <span id="rotation-value" class="font-bold text-yellow-400">0</span>°
        </label>
        <input type="range" id="rotation-slider" 
            min="0" max="360" step="15" value="0" 
            class="w-full">
        
        <div class="text-xs text-slate-400 mt-2">
            💡 R キーでも旋回できます
        </div>
    </div>


    <div id="plate-options" class="fixed top-5 left-32 bg-slate-900/80 text-white p-3 rounded-lg hidden">
        <div class="text-sm font-bold mb-2">敷鉄板サイズ</div>
        <div class="flex gap-2">
            <button class="plate-size-btn active" data-size="1.5x3">1.5×3</button>
            <button class="plate-size-btn" data-size="2x4">2×4</button>
            <button class="plate-size-btn" data-size="1x2">1×2</button>
        </div>
    </div>


    <div class="fixed top-5 right-44 flex gap-2">
        <button id="save-btn" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg">
            💾 保存
        </button>
        <button id="load-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
            📂 読込
        </button>
    </div>


<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module" src="./js/main.js"></script>

 
</body>

</html>
