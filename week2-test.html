<!DOCTYPE html>
<html>
<head>
    <title>Three.js Test</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
     <script src="https://cdn.tailwindcss.com"></script>   
</head>
<body>

        <!-- 替换之前的简陋 UI -->
            <div id="coord-display" class="fixed bottom-5 left-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg font-mono text-sm">
            座標: -
            </div>

            <div id="counter" class="fixed top-5 left-5 bg-slate-900/80 text-white px-4 py-2 rounded-lg">
            配置済み: <span class="font-bold text-blue-400">0</span> 個
            </div>

            <button id="reset-btn" class="fixed top-5 right-5 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold">
            🗑️ クリア
            </button>
            <!-- 顶部加工具栏 -->
        
            <div class="fixed top-5 left-1/2 -translate-x-1/2 bg-slate-900/80 p-2 rounded-lg flex gap-2">
        <button id="select-mode" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-white">
            👆 選択
        </button>
        <button id="place-mode" class="px-4 py-2 bg-blue-600 text-white rounded font-bold">
            🔴 配置
        </button>
        </div>

    <script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
    
    <script type="module">
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as THREE from 'three';

        
        const placedObjects = [];
        let placeMode = true;   // ⭐ 加这一行（开关：true=放置模式开，false=关）

        // 1. シーン作成
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空色

        // 2. カメラ作成
        const camera = new THREE.PerspectiveCamera(
            75, 
            window.innerWidth / window.innerHeight,
            0.1, 
            1000
        );
        camera.position.z = 5;

        // 3. レンダラー作成
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        renderer.shadowMap.enabled = true;


        // 4. 立方体を作る
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });

        // もう一つの立方体（赤）
        const cube2Geom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const cube2Mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        //const cube2 = new THREE.Mesh(cube2Geom, cube2Mat);
        //cube2.position.x = 2;  // 右に 2 移動
        //scene.add(cube2);

        // 球体（青）
        const sphereGeom = new THREE.SphereGeometry(0.7, 32, 32);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        // const sphere = new THREE.Mesh(sphereGeom, sphereMat);
        // sphere.position.x = -2;  // 左に 2 移動
        // scene.add(sphere);

        //Set the light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        // 方向光（太陽のような光）
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 20, 5);
        scene.add(directionalLight);
        directionalLight.castShadow = true;

        
        //add the ground
        const groundGeom = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a5a });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;  // 平にする
        ground.position.y = -1;
        scene.add(ground);
        ground.receiveShadow = true;

        // Ghost 物体（半透明的预览球）
            const ghost = new THREE.Mesh(
            new THREE.SphereGeometry(0.3),
            new THREE.MeshStandardMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.4  // 半透明！
            })
            );
            ghost.position.y = 0.3;
            scene.add(ghost);



        // 在你已有的代码下面
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 监听鼠标移动
        window.addEventListener('mousemove', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(ground);
                
                if (intersects.length > 0) {
                    const point = intersects[0].point;
                    
                    // 坐标显示总是更新
                    document.getElementById('coord-display').textContent = 
                        `座標: X=${point.x.toFixed(2)}, Z=${point.z.toFixed(2)}`;
                    
                    // ⭐ 只有 placeMode 开时才更新 ghost
                    if (placeMode) {
                        ghost.position.x = point.x;
                        ghost.position.z = point.z;
                    }
                }
            });


        window.addEventListener('click', (event) => {
            // ⭐ 如果 placeMode 关了，直接退出（什么都不做）
            if (!placeMode) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                
                const sphere = new THREE.Mesh(
                    new THREE.SphereGeometry(0.3),
                    new THREE.MeshStandardMaterial({ color: 0xff0000 })
                );
                sphere.position.copy(point);
                sphere.position.y = -0.7;
                sphere.castShadow = true;
                scene.add(sphere);
                placedObjects.push(sphere);
                updateCounter();
            }
        });
        
        window.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
        placeMode = false;       // 关闭开关
        ghost.visible = false;    // 隐藏 ghost
        console.log('放置モード OFF');
        }
        });

        function updateCounter() {
            document.getElementById('counter').textContent = 
            `配置済み: ${placedObjects.length} 個`;
        }

    



        document.getElementById('select-mode').addEventListener('click', () => {
            placeMode = false;
            ghost.visible = false;
            // UI 更新
            document.getElementById('select-mode').className = 
                'px-4 py-2 bg-blue-600 text-white rounded font-bold';
            document.getElementById('place-mode').className = 
                'px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-white';
            });

        document.getElementById('place-mode').addEventListener('click', () => {
            placeMode = true;
            ghost.visible = true;
            // UI 更新（反过来）
            document.getElementById('place-mode').className = 
                'px-4 py-2 bg-blue-600 text-white rounded font-bold';
            document.getElementById('select-mode').className = 
                'px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-white';
            });




        // 5. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);
            controls.update();  // ← これを追加
            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('reset-btn').addEventListener('click', () => {
            placedObjects.forEach(obj => scene.remove(obj));
            placedObjects.length = 0;  // 清空数组
            updateCounter();
        });
        
    </script>
</body>
</html>
